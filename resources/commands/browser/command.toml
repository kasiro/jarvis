[[commands]]
id = "browser_open"
type = "python"
script = "sh/open_browser.py"
wake_word_required = false
sounds.ru = ["ok1", "ok2", "ok3", "ok4"]

phrases.ru = [
    "открой браузер",
    "запусти браузер",
    "включи браузер",
    "браузер открой",
    "нужен браузер",
]

