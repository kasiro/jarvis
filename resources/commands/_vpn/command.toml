[[commands]]
id = "vpn_run"
type = "python"
script = "vpn_connect.py"
wake_word_required = false
sounds.ru = ["ok1", "ok2", "ok3", "ok4"]
phrases.ru = [
    "запусти vpn",
    "запусти выпьем",
    "запусти пен",
    "запусти пин",
    "включи vpn",
    "запусти впн",
    "включи впн",
    "подключись к впн",
    "подключись к vpn"
]

[[commands]]
id = "vpn_disconnect"
type = "python"
script = "vpn_disconnect.py"
wake_word_required = false
sounds.ru = ["ok1", "ok2", "ok3", "ok4"]
phrases.ru = [
    "убей vpn",
    "отключи vpn",
    "убей впн",
    "отключи впн"
]
