[[commands]]
id = "open_console"
type = "python"
script = "open_console.py"
wake_word_required = true
sounds.ru = ["ok1", "ok2", "ok3", "ok4"]

phrases.ru = [
    "открой консоль",
    "запусти консоль",
    "включи консоль",
]

[[commands]]
id = "close_console"
type = "python"
script = "close_console.py"
wake_word_required = false
sounds.ru = ["ok1", "ok2", "ok3", "ok4"]

phrases.ru = [
    "закрой консоль"
]
