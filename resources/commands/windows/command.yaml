list:
- command:
    action: ahk
    exe_path: ahk/Roll up windows.exe
    exe_args:
  voice:
    sounds:
    - ok1
    - ok2
    - ok3
  phrases:
  - сверни все окна
  - сверни окна

- command:
    action: ahk
    exe_path: ahk/Empty trash.exe
    exe_args:
  voice:
    sounds:
    - ok1
    - ok2
    - ok3
  phrases:
  - очисти корзину
  - почисти корзину
  - очистка корзины

- command:
    action: cli
    cli_cmd: "gnome-usage"
  voice:
    sounds:
    - ok1
    - ok2
    - ok3
  phrases:
  - запусти диспетчер задач
  - открой диспетчер задач
  - диспетчер задач
  - запусти монитор задач
  - открой монитор задач
  - монитор задач

- command:
    action: cli
    cli_cmd: "killall gnome-usage"
  voice:
    sounds:
    - ok1
    - ok2
    - ok3
  phrases:
  - закрой диспетчер задач
  - заверши диспетчер задач
  - убей диспетчер задач
  - закрой монитор задач
  - заверши монитор задач
  - убей монитор задач

- command:
    action: ahk
    exe_path: ahk/screenshot.exe
    exe_args:
  voice:
    sounds:
    - ok1
    - ok2
    - ok3
  phrases:
  - сделай скриншот
  - сделай снимок экрана
  - сними экран

- command:
    action: cli
    cli_cmd: "loginctl lock-session"
  voice:
    sounds:
    - ok1
    - ok2
    - ok3
    - ok4
  phrases:
  - заблокируй компьютер
  - заблокируй комп
  - блокировка
  - блок

- command:
    action: cli
    cli_cmd: ""
  voice:
    sounds:
    - ok1
    - ok2
    - ok3
    - ok4
  phrases:
  - разблокируй компьютер
  - разблокируй комп
  - разблокировка
  - сизам откройся

- command:
    action: ahk
    exe_path: ahk/sleep.exe
    exe_args:
  voice:
    sounds:
    - ok1
    - ok2
    - ok3
    - ok4
  phrases:
  - спящий режим
  - ждущий режим
  - иди поспи

- command:
    action: ahk
    exe_path: ahk/clipboard.exe
    exe_args:
  voice:
    sounds:
    - ok1
    - ok2
    - ok3
  phrases:
  - открой буфер обмена
  - покажи буфер обмена
  - запусти буфер обмена
  - буфер обмена

- command:
    action: ahk
    exe_path: ahk/Set language.exe
    exe_args:
  voice:
    sounds:
    - ok1
    - ok2
    - ok3
  phrases:
  - смени раскладку
  - поменяй раскладку
  - смени язык
  - поменяй язык
  - переключи на русский
  - переключи на английский
  - смени раскладку на русскую
  - поменяй раскладку на русскую
  - поменяй раскладку на английскую
  - смени раскладку на английскую
  - смени язык на русский
  - поменяй язык на русский
  - смени язык на английский
  - поменяй язык на английский
